<!DOCTYPE html>
<html>
<head>
    <title>Quiz Game</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-box">

    <h1>🧠 Quiz Game</h1>

    <h3>Question <span id="qno">1</span>/20</h3>

    <h2 id="question"></h2>

    <div class="option" onclick="checkAnswer(0)" id="op0"></div>
    <div class="option" onclick="checkAnswer(1)" id="op1"></div>
    <div class="option" onclick="checkAnswer(2)" id="op2"></div>
    <div class="option" onclick="checkAnswer(3)" id="op3"></div>

    <h2 id="result"></h2>

    <h3>🏆 Score: <span id="score">0</span></h3>

    <button class="play-btn" onclick="nextQuestion()">
        Next Question
    </button>

    <button class="back-btn" onclick="location.href='index.html'">
        ← Back
    </button>

</div>

<script>

const quiz = [

{question:"What is the capital of India?",options:["Delhi","Mumbai","Jaipur","Chennai"],answer:0},

{question:"Which language is used for web pages?",options:["Python","HTML","Java","C++"],answer:1},

{question:"2 + 2 = ?",options:["3","5","4","6"],answer:2},

{question:"Who developed Python?",options:["Guido van Rossum","Bill Gates","Elon Musk","Mark Zuckerberg"],answer:0},

{question:"Which planet is called the Red Planet?",options:["Earth","Mars","Jupiter","Venus"],answer:1},

{question:"What does CPU stand for?",options:["Central Process Unit","Central Processing Unit","Computer Processing Unit","Core Processing Unit"],answer:1},

{question:"Which is the largest ocean?",options:["Atlantic","Indian","Pacific","Arctic"],answer:2},

{question:"Python is a?",options:["Snake","Programming Language","Game","Browser"],answer:1},

{question:"HTML stands for?",options:["Hyper Text Markup Language","High Text Machine Language","Hyper Transfer Markup Language","Home Tool Markup Language"],answer:0},

{question:"CSS is used for?",options:["Database","Styling","Gaming","Networking"],answer:1},

{question:"JavaScript runs in?",options:["Browser","Printer","Monitor","Scanner"],answer:0},

{question:"Which company created Windows?",options:["Google","Apple","Microsoft","Intel"],answer:2},

{question:"5 x 6 = ?",options:["25","30","35","40"],answer:1},

{question:"Which is the national animal of India?",options:["Lion","Tiger","Elephant","Leopard"],answer:1},

{question:"What is the capital of Rajasthan?",options:["Jodhpur","Udaipur","Jaipur","Kota"],answer:2},

{question:"Which tag creates a heading in HTML?",options:["h1","p","div","span"],answer:0},

{question:"Which data type stores text in Python?",options:["int","float","str","bool"],answer:2},

{question:"Which symbol is used for comments in Python?",options:["//","#","<!-- -->","**"],answer:1},

{question:"Which is the fastest land animal?",options:["Tiger","Horse","Cheetah","Leopard"],answer:2},

{question:"How many continents are there?",options:["5","6","7","8"],answer:2}

];

let current = 0;
let score = 0;
let answered = false;

loadQuestion();

function loadQuestion(){

    answered = false;

    document.getElementById("qno").innerText = current + 1;

    document.getElementById("question").innerText =
    quiz[current].question;

    for(let i=0;i<4;i++){

        document.getElementById("op"+i).innerText =
        quiz[current].options[i];

        document.getElementById("op"+i).style.background =
        "#334155";
    }

    document.getElementById("result").innerText = "";
}

function checkAnswer(selected){

    if(answered) return;

    answered = true;

    if(selected === quiz[current].answer){

        score++;

        document.getElementById("score").innerText = score;

        document.getElementById("result").innerHTML =
        "✅ Correct!";

        document.getElementById("op"+selected).style.background =
        "green";
    }

    else{

        document.getElementById("result").innerHTML =
        "❌ Wrong!";

        document.getElementById("op"+selected).style.background =
        "red";

        document.getElementById("op"+quiz[current].answer).style.background =
        "green";
    }
}

function nextQuestion(){

    current++;

    if(current >= quiz.length){

        document.querySelector(".game-box").innerHTML = `
        <h1>🎉 Quiz Finished!</h1>
        <h2>Your Score: ${score}/${quiz.length}</h2>
        <button class="play-btn" onclick="location.reload()">Play Again</button>
        <br><br>
        <button class="back-btn" onclick="location.href='index.html'">← Back</button>
        `;

        return;
    }

    loadQuestion();
}

</script>

</body>
</html>
